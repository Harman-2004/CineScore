version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: movie_ai_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=movie_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d movie_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: movie_ai_web
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/movie_db
      - SECRET_KEY=9a8b7c6d5e4f3g2h1i0j9k8l7m6n5o4p3q2r1s0t
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - OMDB_API_KEY=${OMDB_API_KEY:-}
      - PROJECT_NAME=Movie AI Rating Platform
      - ENVIRONMENT=development
    volumes:
      # Map current dir to container for live coding / reloading
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
